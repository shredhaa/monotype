<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Simon Says</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #e0ff00;
      --black: #0a0a0a;
      --accent: #ff6600;
      --purple: #e052ff;
      --green: #00c800;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--black);
      color: var(--black);
      font-family: 'IM Fell English', serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      cursor: none;
    }

    /* Custom cursor */
    #cursor {
      position: fixed;
      width: 10px;
      height: 10px;
      background: white;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.1s;
      mix-blend-mode: difference;
    }

    /* Page wrapper */
    #page {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Top bar */
    #topbar {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 18px 24px 0;
      pointer-events: none;
    }

    #top-left {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .label-tag {
      margin-top:45px;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: white;
      opacity: 0.5;
    }

    #sketch-title {
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: black;
      font-style: italic;
    }

    #site-name {
      font-size: 13px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: black;
      text-align: right;
    }

    /* Bottom bar */
    #bottombar {
      position: fixed;
      bottom: 0; left: 0;
      width: 100%;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding: 0 24px 18px;
      pointer-events: none;
    }

    #caption {
      font-size: 12px;
      letter-spacing: 0.05em;
      color: black;
      font-style: italic;
      opacity: 0.7;
    }

    #page-counter {
      font-size: 12px;
      letter-spacing: 0.1em;
      color: white;
      opacity: 0.5;
    }

    /* Sliders */
    #sliders {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      gap: 40px;
      align-items: center;
      pointer-events: all;
    }

    .slider-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .slider-label {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: black;
      opacity: 0.5;
    }

    input[type=range] {
      -webkit-appearance: none;
      width: 120px;
      height: 1px;
      background: rgba(255,255,255,0.3);
      outline: none;
      cursor: pointer;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: white;
      cursor: pointer;
    }

    /* Navigation arrows */
    .nav-arrow {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      z-index: 100;
      background: none;
      border: none;
      color: black;
      font-size: 28px;
      cursor: pointer;
      opacity: 0.4;
      transition: opacity 0.2s;
      font-family: 'IM Fell English', serif;
      padding: 20px;
      pointer-events: all;
    }

    .nav-arrow:hover { opacity: 1; }
    #arrow-left { left: 8px; }
    #arrow-right { right: 8px; }

    /* Preview box with GIF */
    #preview-box {
      position: fixed;
      top: 18px;
      left: 24px;
      width: 150px;
      height: 100px;
      background: var(--black);
      border: 1px solid rgba(255,255,255,0.2);
      z-index: 101;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #preview-label {
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: white;
      opacity: 0.4;
      position: absolute;
      top: 4px;
      left: 6px;
    }

    #preview-box img {
      width: 150%;
      height: 150%;
      object-fit: cover;
    }

    .preview-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: white;
      opacity: 0.2;
      margin-top: 12px;
    }

    /* Sketch canvas container */
    #sketch-container {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
    }

    #sketch-container canvas {
      display: block;
    }

    /* Sketch dots nav */
    #dots-nav {
      position: fixed;
      bottom: 52px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: white;
      opacity: 0.2;
      transition: opacity 0.3s, transform 0.3s;
      cursor: pointer;
      pointer-events: all;
    }

    .dot.active {
      opacity: 1;
      transform: scale(1.4);
    }

    /* Page transition overlay */
    #transition {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      background: black;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    #transition.fade-in { opacity: 1; pointer-events: all; }

  </style>
</head>
<body>

<div id="cursor"></div>
<div id="transition"></div>

<!-- Top bar -->
<div id="topbar">
  <div style="display:flex; flex-direction:column; gap:2px;">
    <!-- Preview box -->
    <div id="preview-box">
      <span id="preview-label">preview</span>
      <img id="preview-img" src="gifs/draw.gif">
    </div>
    <div style="margin-top: 72px;">
      <div class="label-tag">Interaction</div>
      <div id="sketch-title">—</div>
    </div>
  </div>
  <div id="site-name">Simon Says</div>
</div>

<!-- Navigation -->
<button class="nav-arrow" id="arrow-left" onclick="navigate(-1)">&#8249;</button>
<button class="nav-arrow" id="arrow-right" onclick="navigate(1)">&#8250;</button>

<!-- Sketch canvas -->
<div id="sketch-container"></div>

<!-- Dots nav -->
<div id="dots-nav">
  <div class="dot active" onclick="goTo(0)"></div>
  <div class="dot" onclick="goTo(1)"></div>
  <div class="dot" onclick="goTo(2)"></div>
  <div class="dot" onclick="goTo(3)"></div>
</div>

<!-- Bottom bar -->
<div id="bottombar">
  <div id="caption">—</div>
  <div id="page-counter">01 / 04</div>
</div>

<!-- Sliders -->
<div id="sliders">
  <div class="slider-group">
    <span class="slider-label">Size</span>
    <input type="range" id="slider-size" min="8" max="48" value="20"
      oninput="onSliderChange('size', this.value)">
  </div>
  <div class="slider-group">
    <span class="slider-label">Weight</span>
    <input type="range" id="slider-weight" min="1" max="6" value="1" step="0.5"
      oninput="onSliderChange('weight', this.value)">
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.js"></script>
<script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/addons/p5.sound.min.js"></script>
<script src="https://unpkg.com/ml5@latest/dist/ml5.min.js"></script>

<script>
let globalFontSize = 20;
let globalStrokeWeight = 1;

function onSliderChange(type, val) {
  if (type === 'size') globalFontSize = parseFloat(val);
  if (type === 'weight') globalStrokeWeight = parseFloat(val);
}

const pages = [
  { title: 'Draw with finger', caption: '(Magic intervention by Perrault)' },
  { title: 'Pinch & scale', caption: '(Ritual and quiet resilience  from Grimms Fairy Tales, the story of Aschenputtel)' },
  { title: 'Blow to scatter', caption: '(Gesture of patience and endurance from  Western Cinderella)' },
  { title: 'Nose repels words', caption: '(Incerpts from various adaptations of Cinderella)' },
];

const previews = [
  "gifs/draw.GIF",
  "gifs/pinch.GIF",
  "gifs/blow.GIF",
  "gifs/nose.GIF"
];

let currentPage = 0;
let currentSketch = null;

function updateUI(index) {
  document.getElementById('sketch-title').textContent = pages[index].title;
  document.getElementById('caption').textContent = pages[index].caption;
  document.getElementById('page-counter').textContent =
    String(index + 1).padStart(2, '0') + ' / 04';
  document.querySelectorAll('.dot').forEach((d, i) => {
    d.classList.toggle('active', i === index);
  });
  const img = document.getElementById("preview-img");
  if(img) img.src = previews[index];
}

function navigate(dir) {
  let next = (currentPage + dir + 4) % 4;
  goTo(next);
}

function goTo(index) {
  if (index === currentPage) return;
  const overlay = document.getElementById('transition');
  overlay.classList.add('fade-in');
  setTimeout(() => {
    loadSketch(index);
    currentPage = index;
    updateUI(index);
    overlay.classList.remove('fade-in');
  }, 300);
}

function loadSketch(index) {
  if (currentSketch) {
    currentSketch.remove();
    currentSketch = null;
  }
  const container = document.getElementById('sketch-container');
  container.innerHTML = '';
  const sketchFns = [sketchDraw, sketchPinch, sketchBlow, sketchNose];
  currentSketch = new p5(sketchFns[index], container);
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') navigate(1);
  if (e.key === 'ArrowLeft') navigate(-1);
});

document.addEventListener('mousemove', e => {
  const c = document.getElementById('cursor');
  c.style.left = e.clientX + 'px';
  c.style.top = e.clientY + 'px';
});
</script>

<!-- Sketch scripts -->
<script src="sketch-draw.js"></script>
<script src="sketch-pinch.js"></script>
<script src="sketch-blow.js"></script>
<script src="sketch-nose.js"></script>

<script>
  // Load first sketch
  updateUI(0);
  loadSketch(0);
</script>

</body>
</html>
